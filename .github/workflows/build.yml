name: Build Rust Wheels + Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;26.1.10909125"

      - name: Install maturin + dependencies
        run: |
          pip install maturin
          sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Set cross-compile environment
        run: |
          NDK=${ANDROID_HOME}/ndk/26.1.10909125
          TC=${NDK}/toolchains/llvm/prebuilt/linux-x86_64
          echo "CC_aarch64_linux_android=${TC}/bin/aarch64-linux-android35-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TC}/bin/aarch64-linux-android35-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TC}/bin/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TC}/bin/aarch64-linux-android35-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=${TC}/bin/llvm-ar" >> $GITHUB_ENV
          echo "PYO3_CROSS=1" >> $GITHUB_ENV
          echo "PYO3_CROSS_PYTHON_VERSION=3.12" >> $GITHUB_ENV
          echo "PYO3_CROSS_LIB_DIR=/tmp/py-android" >> $GITHUB_ENV

      - name: Prepare Python 3.12 headers for Android cross-compile
        run: |
          mkdir -p /tmp/py-android/include/python3.12 /tmp/py-android/lib
          curl -sL https://github.com/python/cpython/archive/refs/tags/v3.12.7.tar.gz -o /tmp/cpython.tar.gz
          tar xzf /tmp/cpython.tar.gz -C /tmp
          cp -r /tmp/cpython-3.12.7/Include/* /tmp/py-android/include/python3.12/
          cp /tmp/cpython-3.12.7/pyconfig.h.in /tmp/py-android/include/python3.12/pyconfig.h
          # Create minimal libpython stub for linker
          touch /tmp/py-android/lib/libpython3.12.so
          ls /tmp/py-android/include/python3.12/ | head -5

      - name: Build jiter wheel
        run: |
          mkdir -p /tmp/wheels
          pip download jiter==0.15.0 --no-binary :all: -d /tmp/jiter-src
          cd /tmp/jiter-src
          tar xzf jiter-0.15.0.tar.gz
          cd jiter-0.15.0
          maturin build --release --target aarch64-linux-android --out /tmp/wheels 2>&1 || true
          ls -la /tmp/wheels/ || echo "No wheels produced"

      - name: Build pydantic-core wheel
        run: |
          pip download pydantic-core==2.46.4 --no-binary :all: -d /tmp/pc-src
          cd /tmp/pc-src
          tar xzf pydantic_core-2.46.4.tar.gz
          cd pydantic_core-2.46.4
          maturin build --release --target aarch64-linux-android --out /tmp/wheels 2>&1 || true
          ls -la /tmp/wheels/ || echo "No wheels produced"

      - name: Prepare wheels for Chaquopy
        run: |
          mkdir -p app/libs
          cd /tmp/wheels
          for whl in *.whl; do
            [ -f "$whl" ] || continue
            newname=$(echo "$whl" | sed 's/linux_aarch64/android_arm64_v8a/g')
            cp "$whl" "${GITHUB_WORKSPACE}/app/libs/${newname}"
            echo "Copied: $whl -> app/libs/${newname}"
          done
          ls -la ${GITHUB_WORKSPACE}/app/libs/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: android-rust-wheels
          path: app/libs/*.whl
          retention-days: 90

  build:
    needs: build-wheels
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Download compiled wheels
        uses: actions/download-artifact@v4
        with:
          name: android-rust-wheels
          path: app/libs/

      - name: List wheels
        run: ls -la app/libs/ || echo "No wheels downloaded (expected if build-wheels failed)"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Clean build directory
        run: rm -rf .gradle build app/build

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
